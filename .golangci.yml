version: "2"
run:
  timeout: 10m
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nestif
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gocritic:
      disabled-checks:
        - unnamedResult
    gocyclo:
      min-complexity: 20
    gosec:
      severity: medium
      confidence: medium
    misspell:
      locale: US
      ignore-rules:
        - classis
        - cancelled
        - criterias
        - analyses
        - versoin
        - cancelling
        - catalogue
        - catalogues
        - subscirption
        - ageing
        - defence
    nestif:
      min-complexity: 15
    revive:
      severity: warning
      enable-all-rules: true
      rules:
        - name: var-naming
          arguments:
            - - API
              - ID
              - IDS
              - IP
              - VM
              - JSON
              - HTTP
              - URL
              - XML
              - YAML
              - CSS
              - ACL
              - CPU
              - SQL
            - []
          disabled: false
        - name: argument-limit
          arguments:
            - 6
          disabled: false
        - name: function-result-limit
          arguments:
            - 4
          disabled: false
        - name: line-length-limit
          arguments:
            - 150
          disabled: false
        - name: add-constant
          disabled: true
        - name: banned-characters
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: file-header
          disabled: true
        - name: function-length
          disabled: true
        - name: unhandled-error
          disabled: true
        - name: bare-return
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: use-any
          disabled: true
        - name: unchecked-type-assertion
          disabled: true
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        path: _test\.go
        text: 'var-naming: don''t use underscores in Go names'
      - linters:
          - revive
        path: _test\.go
        text: 'confusing-naming:'
      - path: (.+)\.go$
        text: Error return value of `d.Set` is not checked
    paths:
      - third_party$
      - builtin$
      - examples$
      - huaweicloud/services/deprecated
      - huaweicloud/services/acceptance/deprecated
formatters:
  enable:
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/chnsz/golangsdk)
        - prefix(github.com/huaweicloud/huaweicloud-sdk-go-v3)
        - prefix(github.com/huaweicloud/terraform-provider-huaweicloud)
        - blank
        - dot
      custom-order: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - huaweicloud/services/deprecated
      - huaweicloud/services/acceptance/deprecated
